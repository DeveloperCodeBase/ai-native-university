worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile           on;
    keepalive_timeout  65;
    client_max_body_size 100M;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=ai_limit:10m rate=10r/s;

    server {
        listen 80;
        server_name _;

        # Docker internal DNS resolver — re-resolves every 10s so container IP changes
        # (after docker compose up --build) don't cause stale-IP 502 errors
        resolver 127.0.0.11 valid=10s ipv6=off;
        resolver_timeout 5s;

        # API routes — use variable so resolver TTL is honoured on each request
        location /api/ {
            limit_req zone=api_limit burst=50 nodelay;
            set $api_upstream http://api:4000;
            proxy_pass $api_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
        }

        # AI Gateway routes
        location /ai/ {
            limit_req zone=ai_limit burst=20 nodelay;
            rewrite ^/ai/(.*) /v1/$1 break;
            set $ai_upstream http://ai-gateway:8000;
            proxy_pass $ai_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        # Web app (catch-all)
        location / {
            set $web_upstream http://web:3000;
            proxy_pass $web_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
